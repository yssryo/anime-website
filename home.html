<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/home.css">
    <title>anime tracker</title>
</head>
<body>
    <header>
        <div class="logo">Ani<span>Tracker</span></div>
        <div class="header-item">
            <a href="#">Home</a>
            <a href="#">Genre</a>
            <a href="#">Saved</a>
            <input type="text" placeholder="Search">
            <a href="#" class="user-icon"><img src="src/icon/userlight.png"></a>
        </div>
    </header>

    <main class="hero-image">
        <div class="img-hero fade">
            <img src="src/img/rezero.png" alt="Hero Image">
            <div class="hero-text"><h1>Re:zero</h1></div>
            <button class="hero-btn" onclick="window.location.href='#'">Watch Now</button>
        </div>
        <div class="img-hero fade">
            <img src="src/img/cyberpunk.png" alt="Hero Image">
            <div class="hero-text"><h1>Cyberpunk:Edgerunner</h1></div>
            <button class="hero-btn" onclick="window.location.href='#'">Watch Now</button>
        </div>
        <div class ="img-hero fade">
            <img src="src/img/mushokutensei.png" alt="Hero Image">
            <div class="hero-text"><h1>Mushoku Tensei</h1></div>
            <button class="hero-btn" onclick="window.location.href='#'">Watch Now</button>
        </div>

          <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
          <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </main>

    <div style="text-align: center;">
        <span class="line" onclick="currentSlide(1)"></span>
        <span class="line" onclick="currentSlide(2)"></span>
        <span class="line" onclick="currentSlide(3)"></span>
    </div>


    <section class="popular-anime">

    </section>



    <script src="js/slideshow.js"></script>
</body>
</html>
