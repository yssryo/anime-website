    <div id="overLay"></div>



    <section class="carousal">
        <div class="carousal-img fade">
            <img src="src/img/rezero.png" alt="Hero Image">
            <div class="carousal-text"><h1>Re:zero</h1></div>
            <button class="carousal-btn" onclick="window.location.href='#'">Watch Now</button>

        <div class="carousal-img fade">

            <div class="carousal-text"><h1>Cyberpunk:Edgerunner</h1></div>
            <button class="carousal-btn" onclick="window.location.href='#'">Watch Now</button>
        </div>
        <div class ="carousal-img fade">
            <img src="src/img/mushokutensei.png" alt="Hero Image">
            <h1 class="carousal-text">Mushoku Tensei</h1>
            <button class="carousal-btn" onclick="window.location.href='#'">Watch Now</button>
        </div>
          <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
          <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </main>

    <div class="dot">
        <span class="circle" onclick="currentSlide(1)"></span>

        <span class="circle" onclick="currentSlide(3)"></span>

    <section class="popular-anime">

    </section>
